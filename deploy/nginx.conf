# ============================================================
# Nginx 静态部署配置（PWA 优化版）
# ============================================================
# 使用方法：
#   1. 构建项目：npm run build:prod
#   2. 复制 dist 内容到 /usr/share/nginx/html/
#   3. 覆盖此配置文件：cp deploy/nginx.conf /etc/nginx/conf.d/default.conf
#   4. 测试并重载：nginx -t && nginx -s reload
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩（提升首屏加载速度）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静态资源：长期缓存（JS/CSS/图片/字体）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # HTML 入口：不缓存，确保 PWA 更新及时生效
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # Service Worker：绝不缓存
    location ~ ^/(sw\.js|workbox-[\w-]+\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # Manifest 文件：不缓存
    location ~* \.webmanifest$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # SPA 路由回退：所有未知路径指向 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

